# =============================================================================
# Role: openclaw - Déploiement de l'application OpenClaw
# =============================================================================
---
- name: Créer les répertoires OpenClaw
  file:
    path: "{{ item }}"
    state: directory
    owner: "{{ deploy_user }}"
    group: docker
    mode: "0750"
  loop:
    - "{{ openclaw_data_dir }}"
    - "{{ openclaw_config_dir }}"
    - "/opt/openclaw"
  tags: [openclaw, dirs]

- name: Déployer le fichier docker-compose
  template:
    src: docker-compose.yml.j2
    dest: /opt/openclaw/docker-compose.yml
    owner: "{{ deploy_user }}"
    group: docker
    mode: "0640"
  tags: [openclaw, compose]

- name: Déployer le fichier .env
  template:
    src: openclaw.env.j2
    dest: /opt/openclaw/.env
    owner: "{{ deploy_user }}"
    group: docker
    mode: "0600"
  tags: [openclaw, env]

- name: Tirer l'image OpenClaw
  community.docker.docker_image:
    name: "ghcr.io/openclaw/openclaw"
    tag: "{{ openclaw_version }}"
    source: pull
    force_source: yes
  tags: [openclaw, pull]

- name: Démarrer OpenClaw avec Docker Compose
  community.docker.docker_compose_v2:
    project_src: /opt/openclaw
    state: present
    pull: "{% if openclaw_force_pull | default(false) %}always{% else %}policy{% endif %}"
  register: openclaw_compose
  tags: [openclaw, deploy]

- name: Vérifier que le conteneur est en marche
  community.docker.docker_container_info:
    name: "{{ openclaw_container_name }}"
  register: openclaw_container
  tags: [openclaw, check]

- name: Afficher le statut du conteneur
  debug:
    msg: "OpenClaw est {{ 'en marche' if openclaw_container.container.State.Running else 'arrêté' }}"
  when: openclaw_container.exists
  tags: [openclaw, check]

- name: Attendre que OpenClaw soit prêt
  uri:
    url: "http://127.0.0.1:{{ openclaw_port }}/health"
    method: GET
    status_code: 200
  register: health_check
  retries: 30
  delay: 5
  until: health_check.status == 200
  ignore_errors: yes
  tags: [openclaw, check]

- name: Configurer le backup automatique des données
  cron:
    name: "OpenClaw data backup"
    hour: "2"
    minute: "0"
    job: "tar czf /opt/openclaw/backups/data-$(date +\\%Y\\%m\\%d).tar.gz -C {{ openclaw_data_dir }} . && find /opt/openclaw/backups -name 'data-*.tar.gz' -mtime +7 -delete"
    user: "{{ deploy_user }}"
  tags: [openclaw, backup]

- name: Créer le répertoire de backups
  file:
    path: /opt/openclaw/backups
    state: directory
    owner: "{{ deploy_user }}"
    group: docker
    mode: "0750"
  tags: [openclaw, backup]
