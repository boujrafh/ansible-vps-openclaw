# =============================================================================
# Ferme le port 22 une fois que le 2222 est validé
# =============================================================================
---
- name: "Fermer le port SSH 22 (sécurisation)"
  hosts: all
  become: yes
  gather_facts: no

  tasks:
    - name: Supprimer le port 22 de SSH
      lineinfile:
        path: /etc/ssh/sshd_config
        regexp: "^Port 22$"
        state: absent
      notify: restart sshd

    - name: Supprimer la règle UFW pour port 22
      ufw:
        rule: deny
        port: 22
        proto: tcp
        delete: yes

    - name: Afficher confirmation
      debug:
        msg: |
          ============================================
          ✅ Port 22 fermé avec succès
          ============================================
          Connexion SSH uniquement sur le port {{ ssh_port | default(2222) }}
          ============================================

  handlers:
    - name: restart sshd
      systemd:
        name: "{{ 'ssh' if ansible_os_family == 'Debian' else 'sshd' }}"
        state: restarted
